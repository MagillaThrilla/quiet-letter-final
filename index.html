<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#120b07">
  <meta name="robots" content="noindex, nofollow">
  <title>Quiet Letter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scene" aria-label="A quiet letter">
    <span class="candle-glow" aria-hidden="true"></span>
    <span class="vignette" aria-hidden="true"></span>
    <span class="blackout" aria-hidden="true"></span>

    <a
      class="song-button"
      href="https://youtu.be/UCqQ0itHl1A"
      aria-label='Play "Maybe in Another Life" on YouTube'
    >
      <span class="play-circle" aria-hidden="true">
        <span class="play-triangle"></span>
      </span>
      <span class="label">MAYBE IN ANOTHER LIFE</span>
    </a>
  </main>

  <script>
    (() => {
      const VIDEO_ID = "UCqQ0itHl1A";
      const WEB_URL = `https://youtu.be/${VIDEO_ID}`;
      const IOS_APP_URL = `youtube://watch?v=${VIDEO_ID}`;

      const scene = document.querySelector(".scene");
      const button = document.querySelector(".song-button");

      let isExiting = false;
      let fallbackTimer = null;

      const isAppleMobile = () =>
        /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      const cancelFallback = () => {
        if (fallbackTimer !== null) {
          window.clearTimeout(fallbackTimer);
          fallbackTimer = null;
        }
      };

      window.addEventListener("pagehide", cancelFallback);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) cancelFallback();
      });

      const openSong = () => {
        if (!isAppleMobile()) {
          window.location.assign(WEB_URL);
          return;
        }

        /*
          On iPhone/iPad, try the YouTube app first.
          If the app is unavailable, return to the normal YouTube web page.
          The fallback is cancelled automatically if Safari leaves the page.
        */
        fallbackTimer = window.setTimeout(() => {
          window.location.assign(WEB_URL);
        }, 1300);

        window.location.href = IOS_APP_URL;
      };

      button.addEventListener("click", (event) => {
        event.preventDefault();

        if (isExiting) return;
        isExiting = true;

        button.setAttribute("aria-disabled", "true");
        scene.classList.add("exiting");

        const prefersReducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches;

        const endingDelay = prefersReducedMotion ? 250 : 8100;
        window.setTimeout(openSong, endingDelay);
      });
    })();
  </script>
</body>
</html>
